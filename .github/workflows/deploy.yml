name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, myapo-be]
    timeout-minutes: 20
    steps:
      - name: Run deploy.sh update
        run: /home/myapo/myapo-be/deploy.sh update
